# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# 🚀 Добавляем необходимые разрешения для GITHUB_TOKEN
permissions:
  contents: read               # чтобы читать код репозитория
  pages: write                 # чтобы деплоить на GitHub Pages
  id-token: write              # чтобы проходить аутентификацию (требуется для deploy-pages@v4)

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Указываем папку со сборкой

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
